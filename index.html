// --- 究極の別解対応判定ロジック ---
// [A / B] や prefix[A] の形式を展開し、すべての組み合わせを自動生成する最強エンジンです
function getVariants(targetStr) {
    let results = [targetStr];
    const regex = /\[([^\]]+)\]/;
    let keepGoing = true;
    while(keepGoing) {
        keepGoing = false;
        let nextResults = [];
        for(let i=0; i<results.length; i++) {
            let s = results[i];
            if (regex.test(s)) {
                keepGoing = true;
                let m = s.match(regex);
                let insides = m[1].split(/[\/／,，]/).map(x => x.trim());
                insides.forEach(opt => {
                    nextResults.push(s.replace(m[0], opt));
                });
            } else {
                nextResults.push(s);
            }
        }
        results = nextResults;
    }
    return results;
}

function normalize(s) {
    if (!s) return "";
    return s.toLowerCase().replace(/[.?!,()（）]/g, "").replace(/\s+/g, " ").trim();
}

function flexibleCheck(userStr, targetStr) {
    const u = normalize(userStr);
    let variants = getVariants(targetStr);
    return variants.some(v => normalize(v) === u);
}

// --- 最高傑作（Section5.html）完全準拠のUI制御システム ---
let progressStatus = JSON.parse(localStorage.getItem('eng_jukugi_sec10_ultimate')) || {};
let currentFilter = 'all';

function init() {
    const body = document.getElementById('workbook-body');
    const nav = document.getElementById('nav-menu');
    body.innerHTML = ''; nav.innerHTML = '';
    let lastSec = "";

    workbookData.forEach(q => {
        if(q.sectionName !== lastSec) {
            const sId = `sec-${q.id}`;
            const h2 = document.createElement('h2'); h2.className = 'section-title'; h2.id = sId; h2.innerText = q.sectionName;
            body.appendChild(h2);
            const a = document.createElement('a'); a.className = 'nav-link'; a.href = `#${sId}`; a.innerText = q.sectionName;
            nav.appendChild(a); lastSec = q.sectionName;
        }

        const status = progressStatus[q.id] || 'unseen';
        const card = document.createElement('div'); card.className = `card q-card ${status}`; card.id = `card-${q.id}`;
        if(currentFilter === 'retry' && status !== 'retry') card.classList.add('hidden');

        let html = `<div class="q-meta-row"><div class="q-label-text">${q.id}</div><span class="status-badge status-${status}">${(status==='correct'?'正解':status==='retry'?'要復習':'未実施')}</span></div>`;
        html += `<div class="manual-log-bar"><button class="log-btn" onclick="updateCardStatus('${q.id}','correct')">ノート正解 ✅</button><button class="log-btn" onclick="updateCardStatus('${q.id}','retry')">ノート不正解 ❌</button></div>`;
        
        let contentHTML = "";
        
        if (q.type === 'translation') {
            const parts = q.text.split(/〔|（/);
            contentHTML += `<span class="jp-prompt">${parts[0]}</span>`;
            if(parts[1]) contentHTML += `<span class="instruction-text">〔${parts[1].replace(/〕|）/, "〕")}</span>`;
            contentHTML += `<textarea class="full-input q-in-${q.id}" spellcheck="false" placeholder="英文を入力"></textarea>`;
        } 
        else if (q.type === 'reorder') {
            const parts = q.text.split('<br>');
            const jp = parts[0];
            const baseEng = (parts[1] || "").replace(/\[\[\s*\]\]/g, `<div class="answer-zone" id="zone-${q.id}"></div>`);
            contentHTML += `<span class="jp-prompt">${jp}</span>`;
            
            // 【復活】不足語入力用のUI
            if (q.text.includes("不足")) {
                contentHTML += `<div class="extra-word-ui" style="margin-bottom:10px; display:flex; gap:10px; align-items:center;">
                    <span style="font-size:0.9rem; font-weight:bold; color:#8b5cf6;">➕ 不足語追加:</span>
                    <input type="text" id="extra-in-${q.id}" class="inline-input" placeholder="単語を入力" style="font-size:1rem; width:100px;">
                    <button class="filter-btn" style="background:#8b5cf6; color:white; padding:4px 12px;" onclick="addT('${q.id}')">追加</button>
                </div>`;
            }

            if (q.pool) {
                contentHTML += `<div class="tile-pool" id="pool-${q.id}">${q.pool.map((w, i) => `<div class="tile" id="t-${q.id}-${i}" onclick="useT('${q.id}', \`${w}\`, 't-${q.id}-${i}')">${w}</div>`).join('')}</div>`;
            }
            contentHTML += `<div class="sentence-row"><div class="eng-text">${baseEng || `<div class="answer-zone" id="zone-${q.id}"></div>`}</div></div>`;
        }
        else if (q.type === 'choice') {
            const parts = q.text.split('<br>');
            contentHTML += `<span class="jp-prompt">${parts[0].replace(/\[\[\s*\]\]/g, '<span class="blank-line"></span>')}</span>`;
            
            let choicesHTML = "";
            if (q.choices && q.choices.length > 0) {
                choicesHTML = q.choices.map(c => `<button class="choice-btn" onclick="selC('${q.id}', \`${c}\`, this)">${c}</button>`).join('');
            } else if (parts[1]) {
                const matches = parts[1].match(/[ア-オ][^ア-オ]+/g);
                const extractedChoices = matches ? matches.map(c => c.trim()) : parts[1].split(/\s+/);
                choicesHTML = extractedChoices.map(c => `<button class="choice-btn" onclick="selC('${q.id}', \`${c}\`, this)">${c}</button>`).join('');
            }
            contentHTML += `<div class="choice-wrap" id="choice-${q.id}">${choicesHTML}</div>`;
        }
        else {
            const rows = q.text.split('<br>');
            rows.forEach(row => {
                if (row.match(/[ぁ-んァ-ヶ亜-熙]/) && !row.includes('[[') && !row.includes('ⓐ') && !row.includes('ⓑ')) {
                    contentHTML += `<span class="jp-prompt">${row}</span>`;
                } else {
                    const parsed = row.replace('ⓐ', '<span class="s-mark">ⓐ</span>').replace('ⓑ', '<span class="s-mark">ⓑ</span>')
                                     .replace(/\[\[\s*\]\]/g, () => `<input type="text" class="inline-input q-in-${q.id}" spellcheck="false">`);
                    contentHTML += `<div class="sentence-row"><div class="eng-text">${parsed}</div></div>`;
                }
            });
        }

        html += `<div class="main-content">${contentHTML}</div>`;
        html += `<button class="btn-check" onclick="checkAnswer('${q.id}')">採点する</button><div id="fb-${q.id}" class="feedback"></div>`;
        card.innerHTML = html; body.appendChild(card);
    });
    updateProgressDisplay(); updateIncorrectSummary();
}

function selC(id, val, el) { el.parentElement.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); }

function useT(id, w, tId, isExtra = false) {
    const t = document.getElementById(tId); if(t) t.classList.add('hidden');
    const z = document.getElementById(`zone-${id}`);
    const span = document.createElement('span'); 
    span.className = 'answer-word'; 
    if (isExtra) span.classList.add('extra-word'); // 追加単語は色を変える
    span.innerText = w;
    span.onclick = () => { if(t) t.classList.remove('hidden'); span.remove(); };
    z.appendChild(span);
}

// 【復活】不足語をプールに追加する機能
function addT(id) {
    const inp = document.getElementById(`extra-in-${id}`);
    if (!inp) return;
    const val = inp.value.trim();
    if (!val) return;
    const pool = document.getElementById(`pool-${id}`);
    const idx = pool.children.length;
    const tId = `t-${id}-ex${idx}`;
    const tile = document.createElement('div');
    tile.className = 'tile extra-tile';
    tile.id = tId;
    tile.innerText = val;
    tile.style.borderColor = '#8b5cf6';
    tile.style.color = '#8b5cf6';
    tile.onclick = () => useT(id, val, tId, true);
    pool.appendChild(tile);
    inp.value = '';
}

function updateCardStatus(id, s) {
    progressStatus[id] = s; localStorage.setItem('eng_jukugi_sec10_ultimate', JSON.stringify(progressStatus));
    const card = document.getElementById(`card-${id}`);
    if(card) {
        card.className = `card q-card ${s}`;
        const b = card.querySelector('.status-badge');
        if(b) { b.className = `status-badge status-${s}`; b.innerText = (s==='correct'?'正解':'要復習'); }
    }
    updateProgressDisplay(); updateIncorrectSummary();
}

function checkAnswer(id) {
    const q = workbookData.find(x => x.id === id); const fb = document.getElementById(`fb-${id}`);
    let isCorrect = true; let userAns = "";

    if (q.type === 'choice') {
        const s = document.querySelector(`#choice-${id} .selected`);
        userAns = s ? s.innerText : ""; if(!s || !userAns.includes(q.answers[0])) isCorrect = false;
    } else if (q.type === 'reorder') {
        userAns = Array.from(document.querySelectorAll(`#zone-${id} .answer-word`)).map(t => t.innerText.trim()).join(' ');
        if(!flexibleCheck(userAns, q.answers[0])) isCorrect = false;
    } else if (q.type === 'translation') {
        userAns = document.querySelector(`.q-in-${id}`).value.trim();
        if(!flexibleCheck(userAns, q.answers[0])) isCorrect = false;
    } else {
        const inps = document.querySelectorAll(`.q-in-${id}`);
        const vals = Array.from(inps).map(i => i.value.trim()); userAns = vals.join(' ');
        vals.forEach((v, i) => { 
            const targetAns = q.answers[i] || q.answers[0];
            if(!flexibleCheck(v, targetAns)) isCorrect = false; 
        });
    }

    updateCardStatus(id, isCorrect ? 'correct' : 'retry');
    fb.className = `feedback show ${isCorrect ? 'correct-bg' : 'incorrect-bg'}`;
    
    // Geminiに聞くボタンを含めたフィードバック表示
    fb.innerHTML = `<span class="fb-status-label">${isCorrect ? '⭕ 正解' : '❌ 不正解'}</span>
                    <div><strong>正解例:</strong> ${q.answers.join(' / ')}</div>
                    <div class="youtube-box">${q.explanation.replace(/\n/g, '<br>')}</div>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button class="btn-check" style="flex:1; background:#64748b; margin-top:0; padding:12px; font-weight:bold; color:white; border:none; border-radius:12px; cursor:pointer;" onclick="resetQ('${id}')">もう一度解く</button>
                        <button class="btn-check" style="flex:1; background:#8b5cf6; margin-top:0; padding:12px; font-weight:bold; color:white; border:none; border-radius:12px; cursor:pointer;" onclick="askGemini('${id}')">✨ Geminiに聞く</button>
                    </div>`;
}

function resetQ(id) {
    const card = document.getElementById(`card-${id}`);
    card.querySelectorAll('input, textarea').forEach(i => i.value = '');
    card.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
    const z = document.getElementById(`zone-${id}`); if(z) z.innerHTML = '';
    card.querySelectorAll('.tile').forEach(t => t.classList.remove('hidden'));
    document.getElementById(`fb-${id}`).className = 'feedback';
}

function askGemini(id) {
    const q = workbookData.find(x => x.id === id);
    const prompt = `以下の英語の問題について、小学生でもわかるように優しく、ステップバイステップで論理的に解説してください。\n\n【問題】\n${q.text.replace(/<br>/g, '\n')}\n\n【正解】\n${q.answers.join(' / ')}\n\n【解説】\n${q.explanation}`;
    
    navigator.clipboard.writeText(prompt).then(() => {
        alert('Geminiへの質問文をクリップボードにコピーしました！\nこのままチャット欄に貼り付けて質問してください。');
    }).catch(err => {
        alert('コピーに失敗しました。');
    });
}

}
function updateProgressDisplay() {
    const total = 72; const ok = Object.values(progressStatus).filter(s => s === 'correct').length;
    const per = Math.round((ok / total) * 100);
    document.getElementById('progress-text').innerText = `${ok} / ${total} (${per}%)`;
    document.getElementById('progress-fill').style.width = per + "%";
}
function setFilter(f, el) { currentFilter = f; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); init(); }

window.onload = init;
</script>
